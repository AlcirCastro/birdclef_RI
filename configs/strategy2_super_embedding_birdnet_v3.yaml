name: strategy2_super_embedding_birdnet_v3
seed: 42
similarity: cosine

notes: >
  Strategy 2 (super-embedding) using BirdNET+ V3.0. Audio is pooled to a
  single vector per file after segmenting, then searched with flat FAISS.

data:
  dataset_zip: birdclef-2026.zip
  audio_dir: birdclef_cache/train_audio
  max_records: null
  min_rating: 3.0
  train_ratio: 0.8
  sample_rate: 32000

preprocessing:
  type: none
  params: {}

segmentation:
  type: overlapping
  params:
    window_sec: 5.0
    hop_sec: 2.5
    pad_last: true

embedding:
  type: birdnet_v3
  params:
    model_path: https://zenodo.org/records/18247420/files/BirdNET%2B_V3.0-preview3_Global_11K_FP32.pt?download=1
    batch_size: 16

aggregation:
  type: mean
  params: {}

representation:
  type: audio
  params: {}

indexing:
  type: flat
  params: {}

fusion:
  type: early
  params:
    aggregator: mean

ranking:
  type: max
  params: {}

evaluation:
  top_k: 10
  p_at: [1, 5]
  recall_at: [1, 5, 10]
  measure_latency: true
  measure_memory: true
  noise:
    enabled: false

output:
  results_dir: results
  logs_dir: logs
  cache_dir: birdclef_cache
  plots: true
  save_rankings: true