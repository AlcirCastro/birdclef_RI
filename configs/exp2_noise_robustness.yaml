name: exp2_noise_robustness
seed: 42
similarity: cosine

notes: >
  Noise robustness sweep. Keeps the exp1 retrieval setup but adds spectral
  gating preprocessing on the corpus, then evaluates queries at decreasing
  SNR levels. Field-recording-like noise types (rain/wind/urban/speech)
  will only run if noise_dir is populated with .wav samples.

data:
  dataset_zip: birdclef-2026.zip
  audio_dir: birdclef_cache/train_audio
  max_records: 1500
  min_rating: 3.0
  train_ratio: 0.8
  sample_rate: 32000

preprocessing:
  type: spectral_gating
  params:
    prop_decrease: 1.0
    n_std_thresh: 1.5
    stationary: true

segmentation:
  type: fixed
  params:
    window_sec: 5.0
    pad_last: true

embedding:
  type: perch_v2
  params:
    batch_size: 16

aggregation:
  type: mean

representation:
  type: audio

indexing:
  type: flat

fusion:
  type: early
  params:
    aggregator: mean

ranking:
  type: max

evaluation:
  top_k: 10
  p_at: [1, 5]
  recall_at: [1, 5, 10]
  noise:
    enabled: true
    # Synthetic noise types (always available). Real-world types require noise_dir.
    noise_types: ["white", "pink"]
    snr_db: [20.0, 10.0, 0.0, -5.0]
    # noise_dir: noise_samples   # uncomment + populate to enable rain/wind/urban/speech

output:
  results_dir: results
  logs_dir: logs
  cache_dir: birdclef_cache
  plots: true
  save_rankings: true
