name: strategy1_segments_no_overlap
seed: 42
similarity: cosine

notes: >
  Strategy 1 without overlapping windows. Audio is split into non-overlapping
  5s chunks, every chunk becomes its own document, and per-segment result lists
  are fused with Reciprocal Rank Fusion. This isolates the effect of removing
  2.5s overlap while keeping the segment-based retrieval strategy unchanged.

data:
  dataset_zip: birdclef-2026.zip
  audio_dir: birdclef_cache/train_audio
  max_records: null
  min_rating: 3.0
  train_ratio: 0.8
  sample_rate: 32000

preprocessing:
  type: none
  params: {}

segmentation:
  type: fixed
  params:
    window_sec: 5.0
    drop_last_short: false
    pad_last: true

embedding:
  type: perch_v2
  params:
    batch_size: 16

aggregation:
  type: mean
  params: {}

representation:
  type: segment
  params: {}

indexing:
  type: hnsw
  params:
    M: 32
    ef_construction: 200
    ef_search: 64

fusion:
  type: late
  params: {}

ranking:
  type: rrf
  params:
    k_const: 60.0

evaluation:
  top_k: 10
  p_at: [1, 5]
  recall_at: [1, 5, 10]
  measure_latency: true
  measure_memory: true
  noise:
    enabled: false

output:
  results_dir: results
  logs_dir: logs
  cache_dir: birdclef_cache
  plots: true
  save_rankings: true